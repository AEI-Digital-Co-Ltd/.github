name: 👥 Group Task / Bug Report
description: Standardized template for team coordination.
title: "[G-Issue]: "
labels: ["triage", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📋 Coordination Details
        Please fill out the details below to help the team prioritize this task.

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
      placeholder: Provide a clear summary of the issue...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        *Tip: Mention specific team members in the description if urgent!*

- type: textarea
    id: existing-refs
    attributes:
      label: 🔍 Existing Issue References
      description: Paste the issue numbers here (e.g., #101, #105) so they are linked in the history.
      placeholder: "#123, #456"
    validations:
      required: false

  - type: checkboxes
    id: workflow
    attributes:
      label: Sub-issue Checklist
      options:
        - label: I have linked the existing issues using the native "Sub-issues" button.
        - label: I have verified all sub-tasks have assignees.
